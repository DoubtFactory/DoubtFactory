<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Chemistry Questions | Doubt Factory</title>
<meta name="description" content="Search chemistry questions quickly by topic, chapter, exam, or keyword on Doubt Factory.">
<meta name="keywords" content="search chemistry questions, chemistry search, JEE search, NEET search, question lookup">
<meta name="robots" content="index,follow">
<link rel="canonical" href="search.html">
<meta property="og:title" content="Search Chemistry Questions | Doubt Factory">
<meta property="og:description" content="Search chemistry questions quickly by topic, chapter, exam, or keyword on Doubt Factory.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://doubtfactory.example.com/search.html">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Search Chemistry Questions | Doubt Factory">
<meta name="twitter:description" content="Search chemistry questions quickly by topic, chapter, exam, or keyword on Doubt Factory.">
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<a class="skip-link" href="#mainContent">Skip to main content</a>
<div class="search-page">

    <main id="mainContent" class="container search-shell">

        <div class="search-hero">
            <h2>Search Chemistry Questions</h2>
            <p>Find the right question quickly by topic, chapter, exam, or keyword.</p>
        </div>

        <form class="search-input-wrap" role="search">
            <label class="sr-only" for="searchBox">Search chemistry questions</label>
            <input
                type="text"
                id="searchBox"
                placeholder="Search any chemistry question..."
                autocomplete="off"
                aria-label="Search chemistry questions"
                aria-controls="searchResults"
            >
            <button type="submit" id="searchButton" aria-label="Search chemistry questions">Search</button>
        </form>

        <div class="search-suggestions" id="suggestions"></div>

        <div class="search-filters" id="filterChips">
            <button class="chip active" data-filter="All">All</button>
            <button class="chip" data-filter="JEE Main">JEE Main</button>
            <button class="chip" data-filter="JEE Advanced">JEE Advanced</button>
            <button class="chip" data-filter="NEET">NEET</button>
        </div>

        <div class="search-meta" id="searchMeta" aria-live="polite"></div>
        <div id="searchResults" aria-live="polite"></div>

    </main>

</div>

<script type="module" src="js/search.js"></script>
</body>
</html>
